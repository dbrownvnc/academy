<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투자 아카데미 15회 — 섹터 로테이션 확인 문제</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --bg-sub: #fafafa;
  --text: #1a1a1a;
  --text-sub: #777777;
  --accent: #e11d48;
  --accent2: #f43f5e;
  --border: #e5e5e5;
  --correct: #16a34a;
  --correct-bg: #dcfce7;
  --wrong: #b91c1c;
  --wrong-bg: #fee2e2;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px;
  line-height: 1.7;
  max-width: 680px;
  margin: 0 auto;
  padding: 0 16px 80px;
}

/* ── STICKY SCOREBOARD ── */
#scoreboard {
  position: sticky; top: 0; z-index: 100;
  background: var(--text);
  color: #fff;
  padding: 10px 18px;
  display: flex; align-items: center; gap: 14px;
  flex-wrap: wrap;
  border-bottom: 3px solid var(--accent);
  margin: 0 -16px;
  padding-left: 24px; padding-right: 24px;
}
.sb-label { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; opacity: .6; }
.sb-val { font-size: 18px; font-weight: 700; }
.sb-divider { width: 1px; height: 30px; background: rgba(255,255,255,.2); }
.sb-bar-wrap { flex: 1; min-width: 120px; }
.sb-bar-bg { background: rgba(255,255,255,.2); border-radius: 20px; height: 8px; }
.sb-bar {
  height: 8px; border-radius: 20px; width: 0%;
  background: var(--accent);
  transition: width .4s ease, background .4s ease;
}

/* ── HEADER ── */
.quiz-header {
  border-bottom: 3px solid var(--accent);
  padding: 40px 0 24px;
  margin-bottom: 32px;
}
.quiz-header .qlabel {
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--accent); font-weight: 700; margin-bottom: 10px;
}
.quiz-header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(22px, 5vw, 34px);
  font-weight: 700; line-height: 1.2;
}
.quiz-header p { color: var(--text-sub); font-size: 13px; margin-top: 10px; }

/* ── QUESTION CARD ── */
.q-card {
  background: var(--bg-sub);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 22px 20px;
  margin-bottom: 20px;
}
.q-meta {
  display: flex; gap: 8px; align-items: center;
  margin-bottom: 14px; flex-wrap: wrap;
}
.q-num {
  font-size: 12px; font-weight: 700; color: var(--accent);
  letter-spacing: 1px;
}
.q-type-badge, .q-diff-badge {
  font-size: 10px; padding: 2px 8px; border-radius: 20px;
  font-weight: 700; letter-spacing: 0.5px;
}
.q-type-badge { background: #e11d4814; color: var(--accent); }
.diff-easy { background: #dcfce7; color: #15803d; }
.diff-med  { background: #fef9c3; color: #92400e; }
.diff-hard { background: #fee2e2; color: #b91c1c; }

.q-text {
  font-size: 15px; font-weight: 600; margin-bottom: 16px;
  line-height: 1.6; color: var(--text);
}

/* ── OPTIONS ── */
.options { display: flex; flex-direction: column; gap: 9px; }
.opt-btn {
  width: 100%; text-align: left;
  background: #fff; border: 1.5px solid var(--border);
  border-radius: 8px; padding: 10px 14px;
  font-size: 14px; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  color: var(--text); transition: all .2s;
  line-height: 1.5;
}
.opt-btn:hover:not(:disabled) { border-color: var(--accent); background: #fff5f7; }
.opt-btn.correct { background: var(--correct-bg); border-color: var(--correct); color: var(--correct); font-weight: 600; }
.opt-btn.wrong   { background: var(--wrong-bg);   border-color: var(--wrong);   color: var(--wrong);   }
.opt-btn:disabled { cursor: default; }

/* ── OX ── */
.ox-wrap { display: flex; gap: 12px; }
.ox-btn {
  flex: 1; padding: 14px;
  border: 2px solid var(--border); border-radius: 10px;
  font-size: 26px; cursor: pointer; background: #fff;
  transition: all .2s; text-align: center;
  font-family: 'Noto Sans KR', sans-serif;
}
.ox-btn:hover:not(:disabled) { border-color: var(--accent); }
.ox-btn.correct { background: var(--correct-bg); border-color: var(--correct); }
.ox-btn.wrong   { background: var(--wrong-bg);   border-color: var(--wrong);   }
.ox-btn:disabled { cursor: default; }

/* ── SHORT ANSWER ── */
.sa-wrap { display: flex; gap: 8px; flex-wrap: wrap; }
.sa-input {
  flex: 1; min-width: 180px;
  border: 1.5px solid var(--border); border-radius: 8px;
  padding: 10px 14px; font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  outline: none; color: var(--text);
}
.sa-input:focus { border-color: var(--accent); }
.sa-input:disabled { background: #f3f4f6; color: var(--text-sub); }
.sa-submit {
  padding: 10px 18px; background: var(--accent); color: #fff;
  border: none; border-radius: 8px; font-size: 14px; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif; font-weight: 700;
  transition: opacity .2s;
}
.sa-submit:disabled { opacity: .4; cursor: default; }

/* ── RESULT BADGE ── */
.result-badge {
  display: none; margin-top: 10px;
  font-size: 13px; font-weight: 700;
  padding: 6px 12px; border-radius: 6px;
}
.result-badge.correct { background: var(--correct-bg); color: var(--correct); display: block; }
.result-badge.wrong   { background: var(--wrong-bg);   color: var(--wrong);   display: block; }

/* ── EXPLANATION ── */
.explanation {
  display: none; margin-top: 14px;
  background: #fff; border: 1px solid var(--border);
  border-radius: 8px; padding: 14px 16px;
  font-size: 13px; line-height: 1.7; color: var(--text-sub);
}
.explanation.visible { display: block; }
.explanation strong { color: var(--text); }
.explanation .ex-title {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--accent); margin-bottom: 6px;
}

/* ── MODAL ── */
#finalModal {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.55); align-items: center; justify-content: center;
  padding: 20px;
}
#finalModal.show { display: flex; }
.modal-card {
  background: #fff; border-radius: 16px; padding: 36px 28px;
  max-width: 380px; width: 100%; text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
}
.modal-score {
  font-family: 'Playfair Display', serif;
  font-size: 64px; font-weight: 700; color: var(--accent);
  line-height: 1; margin-bottom: 6px;
}
.modal-grade {
  display: inline-block; background: var(--accent); color: #fff;
  font-size: 22px; font-weight: 700; padding: 4px 20px;
  border-radius: 30px; margin-bottom: 16px;
}
.modal-msg { font-size: 15px; color: var(--text-sub); margin-bottom: 24px; line-height: 1.7; }
.retry-btn {
  width: 100%; padding: 14px; background: var(--accent); color: #fff;
  border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
}
</style>
</head>
<body>

<!-- STICKY SCOREBOARD -->
<div id="scoreboard">
  <div>
    <div class="sb-label">푼 문제</div>
    <div class="sb-val"><span id="sbSolved">0</span> / 10</div>
  </div>
  <div class="sb-divider"></div>
  <div>
    <div class="sb-label">맞힌 문제</div>
    <div class="sb-val" id="sbCorrect">0</div>
  </div>
  <div class="sb-divider"></div>
  <div>
    <div class="sb-label">정답률</div>
    <div class="sb-val"><span id="sbPct">0</span>%</div>
  </div>
  <div class="sb-bar-wrap">
    <div class="sb-bar-bg"><div class="sb-bar" id="sbBar"></div></div>
  </div>
</div>

<!-- HEADER -->
<div class="quiz-header">
  <div class="qlabel">투자 아카데미 15회</div>
  <h1>섹터 로테이션<br>확인 문제</h1>
  <p>총 10문제 · 객관식·단답형·OX 혼합 · 클릭 즉시 채점</p>
</div>

<!-- QUESTIONS CONTAINER -->
<div id="quizContainer"></div>

<!-- FINAL MODAL -->
<div id="finalModal">
  <div class="modal-card">
    <div class="modal-score" id="fScore">0</div>
    <div style="font-size:13px;color:var(--text-sub);margin-bottom:10px;">/ 10점</div>
    <div class="modal-grade" id="fGrade">D</div>
    <div class="modal-msg" id="fMsg">수고하셨습니다!</div>
    <button class="retry-btn" onclick="resetQuiz()">↺ 다시 풀기</button>
  </div>
</div>

<script>
const QUIZ_DATA = [
  {
    id: 1,
    type: 'mcq',
    difficulty: 'easy',
    question: '미국 주식 시장은 총 몇 개의 섹터로 구성되어 있나요?',
    options: ['8개', '10개', '11개', '13개'],
    answer: 2,
    explanation: '강사는 "미국에는 11개 섹터가 있습니다"라고 명확히 언급했습니다. 기업에 투자할 때는 해당 기업이 어느 섹터에 속하는지 파악하는 것이 기본이라고 강조합니다.'
  },
  {
    id: 2,
    type: 'ox',
    difficulty: 'easy',
    question: '경제 사이클(Economic Cycle)은 시장 사이클(Market Cycle)보다 선행합니다. (O/X)',
    answer: 'O',
    explanation: '강사는 "경제 사이클이 먼저 움직이고, 시장 사이클(주가)이 이를 미러링(mirroring)하며 따라간다"고 설명했습니다. 즉, 이코노믹 사이클이 선행지수 역할을 합니다.'
  },
  {
    id: 3,
    type: 'mcq',
    difficulty: 'easy',
    question: '시장 사이클(Market Cycle) 4단계 중, 기관 투자자들이 매각을 시작하고 개인 투자자들이 대량 유입되는 단계는 무엇인가요?',
    options: ['축적(Accumulation)', '상승(Mark-up)', '분배(Distribution)', '하락(Decline)'],
    answer: 2,
    explanation: '분배(Distribution) 단계에서 최고점 도달 전 초기 투자자·기관이 매각을 시작하고, 동시에 개인 투자자(개미)들이 대량 매수에 나섭니다. 기관의 매각은 외부에서 확인하기 어렵습니다.'
  },
  {
    id: 4,
    type: 'mcq',
    difficulty: 'medium',
    question: '영상에서 강사가 현재(영상 기준) 미국 경제가 경제 사이클상 어떤 단계에 가장 가깝다고 진단했나요?',
    options: ['저점(Trough)', '확장(Expansion)', '정점(Peak)', '침체(Recession)'],
    answer: 2,
    explanation: '강사는 "지금 현재 픽(Peak)에 가깝다"고 진단했습니다. 확장 국면도, 저점도, 침체도 아니지만 정점에 근접했으며, 리세션(침체) 전 단계라고 설명합니다.'
  },
  {
    id: 5,
    type: 'short',
    difficulty: 'medium',
    question: '경기 침체(Recession)의 전형적인 전조 신호로, 단기 국채 금리가 장기 국채 금리보다 높아지는 현상을 무엇이라 하나요?',
    answer: '일드커브 역전',
    altAnswers: ['수익률 곡선 역전', '역전', '일드커브역전', 'yield curve 역전'],
    explanation: '강사는 "2년짜리, 10년짜리, 3년짜리 금리가 거꾸로 서는 것, 즉 일드커브(Yield Curve) 역전이 리세션의 전전(前前)현상"이라고 설명했습니다.'
  },
  {
    id: 6,
    type: 'mcq',
    difficulty: 'medium',
    question: '경제 사이클 변화의 6대 원인 중, 강사가 현재 가장 중요하다고 강조한 요인은 무엇인가요?',
    options: ['원자재 수요·공급', '노동시장(실업률)', '수요와 공급', '신기술 탄생'],
    answer: 1,
    explanation: '강사는 "지금 현재 같은 경우는 노동시장, 실업률, 실업수당 신청건수가 굉장히 중요한 부분이었다"고 강조했습니다. 인플레이션 억제를 위해 실업률을 4%대로 올리는 것이 핵심 이슈였습니다.'
  },
  {
    id: 7,
    type: 'mcq',
    difficulty: 'medium',
    question: '강사가 미국 투자 시 핵심 분석의 3대 축으로 제시한 것이 아닌 것은?',
    options: ['거시경제 이해', '기업 펀더멘털 분석', '기술적 분석(차트)', '기관 투자자 심리(Sentiment) 파악'],
    answer: 2,
    explanation: '강사는 거시경제 이해, 기업 펀더멘털 분석, 기관 투자자 심리 파악을 3대 축으로 제시했습니다. 반면 기술적 분석(차트)에 대해서는 "테크니션만 봐서는 안 된다, 의사결정의 기본으로 삼으면 큰 피해가 갈 수 있다"고 경고했습니다.'
  },
  {
    id: 8,
    type: 'ox',
    difficulty: 'medium',
    question: '"주식 전문가"는 존재하기 때문에 그들의 추천 종목에 100% 집중 투자하는 것이 가장 좋은 전략이다. (O/X)',
    answer: 'X',
    explanation: '강사는 "주식 전문가는 없습니다. 미래를 예측할 수 없기 때문에 포트폴리오를 짜서 리스크를 줄이는 것"이라고 강조했습니다. 불확실성에 대비해 다양한 기업에 분산 투자하는 것이 핵심입니다.'
  },
  {
    id: 9,
    type: 'mcq',
    difficulty: 'hard',
    question: '강사가 올해(영상 기준)의 핵심 성장 테마로 지목한 분야와 내년의 핵심 테마를 순서대로 바르게 나열한 것은?',
    options: ['AI 반도체 → 데이터센터', '데이터센터 → 챗봇', '챗봇 → 데이터센터', '클라우드 → AI 반도체'],
    answer: 1,
    explanation: '강사는 "올해는 데이터센터를 구축하기 위한 투자가 핵심이었고, 내년(2025년)은 챗봇이 굉장히 중요한 경제 사이클의 중심이 될 것"이라고 언급했습니다.'
  },
  {
    id: 10,
    type: 'short',
    difficulty: 'hard',
    question: '강사가 3~4년 중기 투자자에게 권장한 현금 보유 비중은 얼마인가요? (숫자+% 형태로 입력)',
    answer: '40%',
    altAnswers: ['40', '40 %'],
    explanation: '강사는 "3~4년 정도 생각하시는 분은 현금을 40%까지 확보해나가야 하지 않나"라고 언급했습니다. 반면 10년 이상 장기 투자자는 20% 수준의 현금으로도 충분하다고 설명합니다.'
  }
];

let state = { solved: 0, correct: 0 };

function getDiffLabel(d) {
  if (d === 'easy') return '<span class="q-diff-badge diff-easy">쉬움</span>';
  if (d === 'med' || d === 'medium') return '<span class="q-diff-badge diff-med">보통</span>';
  return '<span class="q-diff-badge diff-hard">어려움</span>';
}
function getTypeLabel(t) {
  if (t === 'mcq') return '객관식';
  if (t === 'ox') return 'OX';
  return '단답형';
}

function renderQuiz() {
  const container = document.getElementById('quizContainer');
  container.innerHTML = '';
  state = { solved: 0, correct: 0 };
  updateScoreboard();

  QUIZ_DATA.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = 'card-' + q.id;

    let inputHTML = '';
    if (q.type === 'mcq') {
      inputHTML = `<div class="options">` +
        q.options.map((opt, i) =>
          `<button class="opt-btn" onclick="answerMCQ(${q.id}, ${i})" data-idx="${i}">${i+1}. ${opt}</button>`
        ).join('') +
        `</div>`;
    } else if (q.type === 'ox') {
      inputHTML = `<div class="ox-wrap">
        <button class="ox-btn" onclick="answerOX(${q.id}, 'O')">⭕ O</button>
        <button class="ox-btn" onclick="answerOX(${q.id}, 'X')">❌ X</button>
      </div>`;
    } else {
      inputHTML = `<div class="sa-wrap">
        <input type="text" class="sa-input" id="sa-${q.id}" placeholder="답을 입력하세요..." />
        <button class="sa-submit" onclick="answerSA(${q.id})">제출</button>
      </div>`;
    }

    card.innerHTML = `
      <div class="q-meta">
        <span class="q-num">Q${idx+1}</span>
        <span class="q-type-badge">${getTypeLabel(q.type)}</span>
        ${getDiffLabel(q.difficulty)}
      </div>
      <div class="q-text">${q.question}</div>
      ${inputHTML}
      <div class="result-badge" id="rb-${q.id}"></div>
      <div class="explanation" id="exp-${q.id}">
        <div class="ex-title">📝 해설</div>
        <strong>${q.type === 'short' ? '정답: ' + q.answer : ''}</strong>
        ${q.type === 'short' ? '<br>' : ''}
        ${q.explanation}
      </div>
    `;
    container.appendChild(card);
  });

  // Enter key for short answer
  QUIZ_DATA.forEach(q => {
    if (q.type === 'short') {
      const inp = document.getElementById('sa-' + q.id);
      if (inp) inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') answerSA(q.id); });
    }
  });
}

function answerMCQ(qid, selectedIdx) {
  const q = QUIZ_DATA.find(x => x.id === qid);
  const btns = document.querySelectorAll(`#card-${qid} .opt-btn`);
  btns.forEach(b => b.disabled = true);

  const isCorrect = selectedIdx === q.answer;
  btns[selectedIdx].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) btns[q.answer].classList.add('correct');

  showResult(qid, isCorrect);
}

function answerOX(qid, selected) {
  const q = QUIZ_DATA.find(x => x.id === qid);
  const btns = document.querySelectorAll(`#card-${qid} .ox-btn`);
  btns.forEach(b => b.disabled = true);

  const isCorrect = selected === q.answer;
  const selectedBtn = selected === 'O' ? btns[0] : btns[1];
  selectedBtn.classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) {
    const correctBtn = q.answer === 'O' ? btns[0] : btns[1];
    correctBtn.classList.add('correct');
  }

  showResult(qid, isCorrect);
}

function answerSA(qid) {
  const q = QUIZ_DATA.find(x => x.id === qid);
  const inp = document.getElementById('sa-' + qid);
  const btn = inp.parentElement.querySelector('.sa-submit');
  const val = inp.value.trim().replace(/\s/g, '');

  if (!val) return;

  inp.disabled = true;
  btn.disabled = true;

  const normalize = s => s.replace(/\s/g, '').toLowerCase();
  const allAnswers = [q.answer, ...(q.altAnswers || [])].map(normalize);
  const isCorrect = allAnswers.includes(normalize(val));

  showResult(qid, isCorrect);
}

function showResult(qid, isCorrect) {
  const rb = document.getElementById('rb-' + qid);
  const exp = document.getElementById('exp-' + qid);

  rb.textContent = isCorrect ? '✓ 정답!' : '✗ 오답';
  rb.className = 'result-badge ' + (isCorrect ? 'correct' : 'wrong');
  exp.classList.add('visible');

  state.solved++;
  if (isCorrect) state.correct++;
  updateScoreboard();

  if (state.solved === QUIZ_DATA.length) {
    setTimeout(showFinal, 700);
  }
}

function updateScoreboard() {
  document.getElementById('sbSolved').textContent = state.solved;
  document.getElementById('sbCorrect').textContent = state.correct;
  const pct = state.solved > 0 ? Math.round(state.correct / state.solved * 100) : 0;
  document.getElementById('sbPct').textContent = pct;
  const bar = document.getElementById('sbBar');
  bar.style.width = (state.solved / QUIZ_DATA.length * 100) + '%';
  if (pct >= 70) bar.style.background = '#16a34a';
  else if (pct >= 40) bar.style.background = '#f97316';
  else bar.style.background = '#e11d48';
}

function showFinal() {
  const score = state.correct;
  const pct = Math.round(score / QUIZ_DATA.length * 100);
  let grade, msg;
  if (score >= 9) { grade = 'A+'; msg = '🎉 완벽합니다! 섹터 로테이션의 핵심 개념을 완전히 이해하셨습니다!'; }
  else if (score >= 8) { grade = 'A';  msg = '🌟 훌륭합니다! 거시경제와 시장 사이클을 잘 이해하고 계십니다.'; }
  else if (score >= 6) { grade = 'B';  msg = '👍 좋습니다! 기본 개념은 잡혔으니 경제 사이클 부분을 복습해보세요.'; }
  else if (score >= 4) { grade = 'C';  msg = '📚 조금 더 공부가 필요합니다. 영상을 다시 보며 핵심 개념을 정리해보세요.'; }
  else               { grade = 'D';  msg = '💪 처음부터 차근차근 다시 풀어보세요. 섹터 로테이션은 반복 학습이 중요합니다!'; }

  document.getElementById('fScore').textContent = score;
  document.getElementById('fGrade').textContent = grade;
  document.getElementById('fMsg').textContent = msg;
  document.getElementById('finalModal').classList.add('show');
}

function resetQuiz() {
  document.getElementById('finalModal').classList.remove('show');
  renderQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Init
renderQuiz();
</script>
</body>
</html>
